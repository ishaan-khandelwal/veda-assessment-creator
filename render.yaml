services:
  - type: web
    name: veda-assessment-backend
    env: node
    plan: free
    branch: main
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run start
    envVars:
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        value: ""
      - key: REDIS_HOST
        value: ""
      - key: REDIS_PORT
        value: ""
      - key: GEMINI_API_KEY
        value: ""

  - type: web
    name: veda-assessment-frontend
    env: node
    plan: free
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: "https://<your-backend>.onrender.com/api"
      - key: NEXT_PUBLIC_WS_BASE
        value: "https://<your-backend>.onrender.com"
